name: glasstrail
description: "GlassTrail is a personal drink-tracking app built with Flutter."
publish_to: "none"
version: 3.0.0

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  app_links: ^7.2.1
  cupertino_icons: ^1.0.8
  file_selector: ^1.0.3
  fl_chart: ^1.1.1
  flutter_timezone: ^5.1.0
  google_fonts: ^8.0.2
  image: ^4.9.1
  image_picker: ^1.2.3
  intl: ^0.20.2
  latlong2: ^0.10.1
  maplibre_gl: ^0.26.2
  maplibre_gl_web: ^0.26.1
  path_provider: ^2.1.6
  shared_preferences: ^2.5.3
  uuid: ^4.5.1
  supabase_flutter: ^2.16.0
  package_info_plus: ^10.2.0
  url_launcher: ^6.3.2
  geolocator: ^14.0.3
  geocoding: ^5.0.0
  qr_flutter: ^4.1.0
  share_plus: ^13.2.0
  web: ^1.1.1
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  pointer_interceptor: ^0.10.1+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  cider: ^0.2.9
  flutter_lints: ^6.0.0
  url_launcher_platform_interface: ^2.3.2
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8

# TODO(temporary): shared_preferences_android 2.4.26 rewrote its internal
# implementation to Kotlin Pigeon and dropped the legacy MethodChannel
# (`plugins.flutter.io/shared_preferences`) that this app's `SharedPreferences
# .getInstance()` calls still rely on, so every read/write throws
# MissingPluginException on Android and the app hangs on the bootstrap
# splash forever. Pinning to the last version before that rewrite until the
# app migrates to `SharedPreferencesAsync` (the officially recommended
# non-legacy API) — see shared_preferences_android's CHANGELOG.md 2.4.26 entry.
dependency_overrides:
  shared_preferences_android: 2.4.25

cider:
  link_template:
    tag: https://github.com/donjoergo/glasstrail/releases/tag/%tag%
    diff: https://github.com/donjoergo/glasstrail/compare/%from%...%to%

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icon/app_icon.png
    - google_fonts/Manrope-Regular.ttf
  fonts:
    - family: ProfileEmoji
      fonts:
        - asset: assets/fonts/profile_emoji_subset.ttf
