name: glasstrail
description: "GlassTrail is a personal drink-tracking app built with Flutter."
publish_to: "none"
version: 1.4.0

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  app_links: ^7.0.0
  cupertino_icons: ^1.0.8
  file_selector: ^1.0.3
  fl_chart: ^1.1.1
  flutter_timezone: ^5.0.2
  google_fonts: ^8.0.2
  image: ^4.8.0
  image_picker: ^1.2.1
  intl: ^0.20.2
  latlong2: ^0.9.1
  maplibre_gl: ^0.25.0
  maplibre_gl_web: ^0.25.0
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  uuid: ^4.5.1
  supabase_flutter: ^2.12.0
  package_info_plus: ^9.0.0
  url_launcher: ^6.3.2
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  qr_flutter: ^4.1.0
  share_plus: ^12.0.2
  web: ^1.1.1
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  cider: ^0.2.9
  flutter_lints: ^6.0.0
  url_launcher_platform_interface: ^2.3.2
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

cider:
  link_template:
    tag: https://github.com/donjoergo/glasstrail/releases/tag/%tag%
    diff: https://github.com/donjoergo/glasstrail/compare/%from%...%to%

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icon/app_icon.png
  fonts:
    - family: ProfileEmoji
      fonts:
        - asset: assets/fonts/profile_emoji_subset.ttf
