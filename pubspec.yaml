name: glasstrail
description: "GlassTrail is a personal drink-tracking app built with Flutter."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  file_selector: ^1.0.3
  fl_chart: ^1.1.1
  google_fonts: ^6.3.2
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  uuid: ^4.5.1
  supabase_flutter: ^2.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
