name: glasstrail
description: GlassTrail - Track every sip.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  file_picker: ^10.3.10
  fl_chart: ^1.1.1
  flutter_map: ^8.2.2
  go_router: ^17.1.0
  google_fonts: ^8.0.2
  http: ^1.2.2
  intl: ^0.20.2
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icon/app_icon.png
  web:
    generate: true
    image_path: assets/icon/app_icon.png
    background_color: "#F8FAFC"
    theme_color: "#1F7A8C"

flutter:
  uses-material-design: true
  generate: true
