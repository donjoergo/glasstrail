<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Glass Trail - Track every sip">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Glass Trail">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />
  <script src="https://unpkg.com/maplibre-gl@^4.3/dist/maplibre-gl.js"></script>
  <script>
    (() => {
      const trackpadZoomRate = 1 / 40;
      const wheelZoomRate = 1 / 180;
      const scrollZoomHandler = window.maplibregl?.ScrollZoomHandler;
      const prototype = scrollZoomHandler?.prototype;
      if (!prototype || prototype.__glasstrailFastZoomPatched) {
        return;
      }

      const originalEnable = prototype.enable;
      if (typeof originalEnable !== 'function') {
        return;
      }

      prototype.enable = function (...args) {
        const result = originalEnable.apply(this, args);
        this.setZoomRate?.(trackpadZoomRate);
        this.setWheelZoomRate?.(wheelZoomRate);
        return result;
      };
      prototype.__glasstrailFastZoomPatched = true;

      const collapseAttributionElement = (element) => {
          if (element.dataset.glasstrailCompactInitialized === 'true') {
            return;
          }

          element.dataset.glasstrailCompactInitialized = 'true';
          element.classList.add('maplibregl-compact');
          element.classList.remove('maplibregl-compact-show');
          if ('open' in element) {
            element.open = false;
          }
          element.removeAttribute?.('open');
          element.querySelectorAll?.('details').forEach((details) => {
            details.open = false;
            details.removeAttribute?.('open');
          });
      };

      const collapseAttributionControl = (root = document) => {
        if (root.matches?.('.maplibregl-ctrl-attrib')) {
          collapseAttributionElement(root);
        }
        root.querySelectorAll?.('.maplibregl-ctrl-attrib').forEach(
          collapseAttributionElement,
        );
      };

      collapseAttributionControl();
      new MutationObserver((mutations) => {
        for (const mutation of mutations) {
          mutation.addedNodes.forEach((node) => {
            if (node instanceof Element) {
              collapseAttributionControl(node);
            }
          });
        }
      }).observe(document.documentElement, {
        childList: true,
        subtree: true,
      });
    })();
  </script>
  <link href="https://unpkg.com/maplibre-gl@^4.3/dist/maplibre-gl.css" rel="stylesheet" />

  <title>Glass Trail</title>
  <link rel="manifest" href="manifest.json">
</head>

<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
