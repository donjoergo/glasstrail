sonar.projectKey=donjoergo_glasstrail
sonar.organization=donjoergo

# Analyze app source, backend SQL/functions, tooling, and the Vercel API
# function. Tests are declared separately so they no longer inflate size,
# complexity, duplication, and coverage metrics.
sonar.sources=lib,supabase,tool,api
sonar.tests=test,integration_test

# Coverage path
sonar.dart.lcov.reportPaths=coverage/lcov.info

# Exclude binary assets and generated localization output from analysis.
sonar.exclusions=**/*.png,**/*.ico,lib/l10n/app_localizations*.dart

# SQL migrations are append-only history and intentionally repeat policy and
# trigger boilerplate across files; seed data repeats row patterns. Neither is
# meaningful code duplication.
sonar.cpd.exclusions=supabase/migrations/**,supabase/seed.sql

# Only Flutter app code under lib/ is expected to have test coverage.
sonar.coverage.exclusions=supabase/**,tool/**,api/**

# Encoding of the source code.
sonar.sourceEncoding=UTF-8
